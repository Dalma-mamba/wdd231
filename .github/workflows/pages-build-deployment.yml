name: pages-build-deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare public folder
        run: |
          set -e
          mkdir -p public
          # Copy site files into public, excluding CI folder
          shopt -s dotglob || true
          for f in *; do
            if [ "$f" != ".github" ] && [ "$f" != ".git" ]; then
              cp -r "$f" public/ || true
            fi
          done

      - name: Show build output (diagnostic)
        run: |
          echo "Working directory: $(pwd)"
          echo "Files in repo root:" && ls -la
          echo "Listing public folder (what will be deployed):" && ls -laR public || true
          du -sh public || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
